name = "mr-portfolio"
compatibility_date = "2026-06-20"

# Static-assets-only Worker: serve the Vite build output (dist/) directly.
# An explicit [assets] block stops wrangler from trying to auto-configure the
# Cloudflare Vite plugin (which would require Vite >= 6).
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
